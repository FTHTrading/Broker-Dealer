<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A2742;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7C948;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)" rx="1"/>
  
  <!-- Chart decoration (left side) -->
  <g transform="translate(50, 60)" opacity="0.15">
    <polyline points="0,80 20,60 40,70 60,40 80,50 100,20 120,30 140,10" 
              fill="none" stroke="#00D4AA" stroke-width="2"/>
    <polyline points="0,90 20,75 40,85 60,55 80,65 100,45 120,50 140,35" 
              fill="none" stroke="#0078D4" stroke-width="2"/>
  </g>
  
  <!-- Chart decoration (right side) -->
  <g transform="translate(600, 60)" opacity="0.15">
    <rect x="0" y="60" width="12" height="30" fill="#00D4AA" rx="2"/>
    <rect x="18" y="40" width="12" height="50" fill="#0078D4" rx="2"/>
    <rect x="36" y="50" width="12" height="40" fill="#00D4AA" rx="2"/>
    <rect x="54" y="20" width="12" height="70" fill="#0078D4" rx="2"/>
    <rect x="72" y="35" width="12" height="55" fill="#00D4AA" rx="2"/>
    <rect x="90" y="10" width="12" height="80" fill="#0078D4" rx="2"/>
    <rect x="108" y="25" width="12" height="65" fill="#00D4AA" rx="2"/>
  </g>
  
  <!-- Logo mark -->
  <g transform="translate(310, 35)">
    <rect x="0" y="0" width="8" height="35" fill="url(#accent)" rx="2"/>
    <rect x="12" y="8" width="8" height="27" fill="url(#gold)" rx="2"/>
    <rect x="24" y="4" width="8" height="31" fill="url(#accent)" rx="2"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="105" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="38" font-weight="700" fill="#FFFFFF" text-anchor="middle" 
        letter-spacing="2">FTH TRADING</text>
  
  <!-- Subtitle -->
  <text x="400" y="135" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="16" font-weight="400" fill="#8899AA" text-anchor="middle" 
        letter-spacing="4">BROKER-DEALER PLATFORM</text>
  
  <!-- Tagline -->
  <text x="400" y="165" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
        font-size="11" font-weight="300" fill="#00D4AA" text-anchor="middle" 
        letter-spacing="3">SEC REGISTERED  ·  FINRA MEMBER  ·  SIPC MEMBER</text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="197" width="800" height="3" fill="url(#accent)" rx="1"/>
</svg>
